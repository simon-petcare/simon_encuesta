<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta - Cuidado de Mascotas en Lima</title>
<style>
  :root{--bg:#eaf0fb;--card:#fff;--primary:#1e40c4;--primary-dark:#152d8a;--accent:#fdd835;--accent-dark:#f9a825;--border:#dbe4f3;--text:#1a1f36;--muted:#6b7280;--err:#dc2626;--ok:#059669}
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body{background:linear-gradient(180deg,#eaf0fb 0%,#f5f7fa 100%);min-height:100vh;color:var(--text);margin:0;padding:20px;line-height:1.5}
  .container{max-width:720px;margin:0 auto}
  .card{background:var(--card);border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(30,64,196,.08);margin-bottom:16px;border-top:5px solid var(--accent)}
  h1{color:var(--primary-dark);margin:0 0 8px;font-size:24px}
  h2{color:var(--primary-dark);margin:0 0 20px;font-size:20px;border-bottom:2px solid var(--border);padding-bottom:12px}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:0}
  .question{margin-bottom:24px}
  .question label.q{display:block;font-weight:600;margin-bottom:10px;font-size:15px}
  .question label.q .req{color:var(--err)}
  .options label{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.15s;font-size:14px}
  .options label:hover{border-color:var(--primary);background:#f0f7ff}
  .options input{margin-top:3px;cursor:pointer}
  .options input:checked + span{font-weight:600;color:var(--primary-dark)}
  .options label:has(input:checked){border-color:var(--primary);background:#eff6ff}
  textarea{width:100%;min-height:100px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical}
  textarea:focus{outline:none;border-color:var(--primary)}
  .grid-table{width:100%;border-collapse:collapse;font-size:13px}
  .grid-table th{background:#f9fafb;padding:10px 6px;font-weight:600;text-align:center;border-bottom:2px solid var(--border)}
  .grid-table th:first-child{text-align:left;width:45%}
  .grid-table td{padding:12px 6px;border-bottom:1px solid var(--border);text-align:center}
  .grid-table td:first-child{text-align:left;font-weight:500}
  .grid-table input[type=radio]{cursor:pointer;transform:scale(1.2)}
  .btn{background:var(--primary);color:#fff;border:0;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{background:var(--primary-dark)}
  .btn:disabled{background:#9ca3af;cursor:not-allowed}
  .btn-secondary, #btnBack{background:#fff !important;color:#1e40c4 !important;border:2px solid #1e40c4 !important;box-shadow:none !important}
  .btn-secondary:hover, #btnBack:hover{background:#eff6ff !important;color:#152d8a !important;transform:none}
  .nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}

  .header-logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px;text-align:center}
  .main-logo{max-width:280px;width:100%;height:auto;border-radius:16px;box-shadow:0 6px 20px rgba(30,64,196,.25);display:block}
  .header-text{text-align:center}
  .tagline{font-size:16px;font-weight:700;color:var(--primary-dark);margin-bottom:2px}
  @media(min-width:600px){.main-logo{max-width:320px}}
  .progress-wrap{margin-bottom:24px}
  .progress-text{font-size:12px;color:var(--muted);margin-top:6px;text-align:right;font-weight:600}
  .progress{height:10px;background:var(--border);border-radius:999px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#60a5fa 0%,#1e40c4 100%);transition:width .4s ease;border-radius:999px}
  .section-info{background:#f0f5ff;border-left:4px solid var(--accent);padding:16px 18px;border-radius:8px;margin-bottom:20px;font-size:14px;color:#1a1f36;line-height:1.6}
  .btn{background:var(--primary);box-shadow:0 2px 8px rgba(30,64,196,.3)}
  .btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
  .final h2{color:var(--primary-dark)}
  h2{color:var(--primary-dark)}
  .options label:has(input:checked){border-color:var(--primary);background:#f0f5ff;box-shadow:0 0 0 2px rgba(30,64,196,.1)}

  .err-msg{color:var(--err);font-size:13px;margin-top:6px;display:none}
  .err-msg.show{display:block}
  .hidden{display:none}
  .final{text-align:center;padding:60px 32px}
  .final h2{border:0;font-size:28px}
  .final p{color:var(--muted);font-size:16px}
  .section-info{background:#eff6ff;border-left:4px solid var(--primary);padding:12px 16px;border-radius:4px;margin-bottom:20px;font-size:14px;color:#1e3a8a}
</style>
</head>

    {id:'p16',type:'radio',label:'16. Cuando lo dejas al cuidado, ¿cuánto suele durar esa ausencia?',options:['Solo unas horas (medio día)','1 día completo','2 a 3 días','4 a 7 días','Más de una semana'],required:true},
    {id:'p17',type:'checkbox',label:'17. ¿Con quién sueles dejarlo? Marca todas las que apliquen.',options:['Con un familiar','Con un amigo o conocido','Con un vecino','En un hospedaje canino u hotel para perros','Con un cuidador independiente que va a mi casa','En la veterinaria','A través de una aplicación o plataforma digital','No he dejado a mi perro al cuidado de nadie','Otro'],required:true},
    {id:'p18',type:'radio',label:'18. Pregunta de control: selecciona "Casi nunca" para continuar.',options:['Siempre','Casi siempre','A veces','Casi nunca','Nunca'],required:true,attention:'Casi nunca'},
    {id:'p19',type:'scale',label:'19. Pensando en la última vez que dejaste a tu perro al cuidado, ¿qué tan satisfecho quedaste?',min:1,max:5,minLabel:'Nada satisfecho',maxLabel:'Muy satisfecho',required:true},
    {id:'p20',type:'checkbox',label:'20. Si usaste un hospedaje canino, ¿qué problemas experimentaste?',options:['Estaba lejos de mi casa','Precio alto para lo que ofrecía','Instalaciones no dieron confianza','Mezclaban perros de diferentes tamaños','No recibí actualizaciones durante la estadía','Mi perro regresó en peor estado','El cuidado no fue personalizado','No experimenté ningún problema','No aplica / no he usado hospedaje','Otro'],required:false},
  ]},
  { title:'Tu experiencia buscando cuidado', questions:[
    {id:'p21',type:'scale',label:'21. La última vez que necesitaste dejar a tu perro, ¿qué tan difícil fue encontrar una opción de confianza?',min:1,max:5,minLabel:'Muy fácil',maxLabel:'Muy difícil',required:true},
    {id:'p22',type:'radio',label:'22. ¿Alguna vez dejaste de viajar o salir porque no encontraste con quién dejar a tu perro?',options:['Sí, varias veces','Sí, una vez','No'],required:true},
    {id:'p23',type:'checkbox',label:'23. Para evaluar si un cuidador es confiable, ¿qué fuentes usas? (máximo 3)',options:['Recomendación de familiares o amigos','Reseñas en Google/Facebook/redes','Visita previa al lugar','Entrevista con el cuidador','Grupos de dueños de perros en redes','Mi propia intuición','El precio del servicio','Otro'],max:3,required:true},
    {id:'p24',type:'radio',label:'24. Pregunta de control: selecciona "De acuerdo" para continuar.',options:['Muy en desacuerdo','En desacuerdo','Neutral','De acuerdo','Muy de acuerdo'],required:true,attention:'De acuerdo'},
  ]},
  { title:'Atributos valorados', info:'En esta sección te pediremos evaluar una serie de atributos de los servicios de cuidado canino desde dos perspectivas distintas:<br><br><b>Importancia:</b> qué tanto valoras cada atributo al momento de elegir un servicio para tu perro — es decir, qué tan relevante es para ti.<br><br><b>Satisfacción:</b> qué tan bien consideras que la oferta actual del mercado está cumpliendo con cada uno de esos atributos hoy en día.<br><br>Antes de responder las siguientes preguntas, es importante que tengas claridad sobre qué significa cada uno de los atributos evaluados. A continuación, se presentan sus definiciones para asegurar un entendimiento común y facilitar respuestas más precisas:<br><br><b>Cercanía al domicilio.</b> Hace referencia a la proximidad geográfica entre la vivienda del dueño y el establecimiento o cuidador. Es un factor logístico crítico que determina el tiempo de traslado, el costo indirecto de movilidad y la facilidad para realizar visitas o recoger al perro en caso de emergencia. En un mercado fragmentado como el limeño, la cercanía reduce la fricción de uso y aumenta la percepción de control del dueño sobre el servicio.<br><br><b>Precio justo.</b> Corresponde a la percepción de equilibrio entre el monto pagado y el valor recibido, no necesariamente al precio más bajo. Un precio se considera justo cuando la calidad del cuidado, la transparencia operativa y los beneficios percibidos justifican la inversión realizada. En el contexto de Simón, este atributo se vincula directamente con la disposición a pagar observada en el rango de S/.30 – S/.80 por día.<br><br><b>Confianza en las instalaciones.</b> Se refiere al grado de seguridad psicológica que el dueño experimenta respecto al espacio físico donde su mascota será cuidada. Incluye la percepción de orden, higiene, profesionalismo y ausencia de riesgos visibles. Es un atributo que opera en el plano emocional y que se construye a partir de señales tangibles como el estado del local, la organización del personal y la transparencia visual del entorno.<br><br><b>Separación de perros por tamaño.</b> Es la práctica operativa de agrupar a los perros en espacios diferenciados según su peso y envergadura, con el fin de prevenir accidentes, agresiones involuntarias y estrés en animales pequeños o vulnerables. Representa un estándar mínimo de cuidado responsable y es un indicador clave de la profesionalización del establecimiento.<br><br><b>Actualizaciones con fotos/videos durante la estadía.</b> Consiste en el envío periódico de contenido visual (imágenes, clips o transmisiones en vivo) que documenta el estado y las actividades del perro mientras se encuentra bajo cuidado externo. Funciona como el antídoto directo contra la ansiedad y la culpa del dueño, y constituye uno de los pilares operativos de la “Confianza Total” identificada en la investigación.<br><br><b>Cuidado personalizado a mi perro.</b> Implica la adaptación del servicio a las características particulares del animal: raza, edad, temperamento, condiciones médicas, rutinas alimenticias y preferencias de juego. Se opone al modelo industrial de “almacenamiento masivo” y se traduce en atención individualizada, observación constante y ajuste del trato según las necesidades específicas de cada mascota.<br><br><b>Seguridad física del local.</b> Abarca el conjunto de condiciones estructurales y protocolares que previenen fugas, accidentes, robos o daños físicos al animal. Incluye cercos adecuados, zonas delimitadas, control de accesos, supervisión permanente y protocolos de emergencia. Es un requisito básico no negociable que, al fallar, se convierte en un dealbreaker inmediato.<br><br><b>Atención veterinaria disponible.</b> Se refiere a la posibilidad de acceder a servicios médicos profesionales ante cualquier eventualidad de salud durante la estadía, ya sea mediante un veterinario en sitio, un convenio con una clínica cercana o un protocolo de respuesta rápida. Este atributo ofrece respaldo frente al riesgo más temido por el dueño: que algo grave le ocurra al perro lejos de casa.<br><br><b>Experiencia y reputación del cuidador.</b> Corresponde a la trayectoria demostrable del proveedor del servicio, medida a través de años en la actividad, número de mascotas atendidas, formación en manejo canino y recomendaciones verificadas de clientes previos. Actúa como el principal mecanismo de reducción de la asimetría de información entre el dueño y el cuidador.<br><br><b>Trato cariñoso.</b> Describe la calidad afectiva del vínculo que el cuidador establece con el perro durante la estadía: paciencia, ternura, contacto físico positivo y disposición genuina a relacionarse con el animal. Aunque es un atributo intangible, es uno de los más valorados por los dueños, ya que conecta directamente con la concepción del perro como miembro de la familia y no como un objeto a resguardar.', questions:[
    {id:'p25',type:'grid',label:'25. ¿Qué tan IMPORTANTE es cada característica al elegir un servicio?',rows:atributos,cols:['1 Nada','2','3','4','5 Mucho'],required:true},
    {id:'p26',type:'grid',label:'26. Pensando en las opciones ACTUALES del mercado, ¿qué tan SATISFECHO estás?',rows:atributos,cols:['1 Nada','2','3','4','5 Mucho'],required:true},
  ]},
  { title:'Gasto mensual', questions:[
    {id:'p27',type:'radio',label:'27. ¿Cuánto gastas al mes en promedio en el cuidado de tu(s) perro(s)?',options:['Menos de S/ 100','S/ 100 – S/ 200','S/ 201 – S/ 350','S/ 351 – S/ 500','S/ 501 – S/ 800','Más de S/ 800','Prefiero no responder'],required:true},
    {id:'p28',type:'radio',label:'28. ¿Cuánto estarías dispuesto a pagar POR NOCHE por un hospedaje canino de confianza con instalaciones seguras y actualizaciones constantes?',options:['Menos de S/ 40','S/ 40 – S/ 70','S/ 71 – S/ 100','S/ 101 – S/ 150','Más de S/ 150'],required:true},
  ]},
  { title:'Tu servicio ideal', questions:[
    {id:'p30',type:'textarea',label:'30. Si pudieras diseñar tu servicio ideal de cuidado para perros, ¿qué te gustaría que ofreciera? (opcional)',required:false},
  ]},
  { title:'¿Quieres saber más sobre Simón?', info:'¡Estamos desarrollando <b>Simón</b>, un nuevo servicio de cuidado de perros pensado para dueños que buscan confianza, seguridad y un trato personalizado! 🐾<br><br>Si te gustaría que te contactemos cuando lancemos el servicio o para contarte más, déjanos tus datos abajo. <b>Todos los campos son opcionales</b> y tu información solo se usará para este fin.', questions:[
    {id:'c_nombre',type:'text',label:'Nombre (opcional)',required:false,placeholder:'Tu nombre'},
    {id:'c_celular',type:'text',label:'Celular o WhatsApp (opcional)',required:false,placeholder:'Ej: 999 888 777'},
    {id:'c_email',type:'text',label:'Correo electrónico (opcional)',required:false,placeholder:'tu@email.com'},
  ]},
];

// ============ MOTOR ============
let currentPage = 0;
const responses = {};
let disqualified = false;

function render(){
  const area = document.getElementById('form-area');
  const page = pages[currentPage];
  let html = `<h2>${page.title}</h2>`;
  if(page.info) html += `<div class="section-info">${page.info}</div>`;
  page.questions.forEach(q=>html += renderQ(q));
  area.innerHTML = html;

  // progress
  const pct = Math.round(currentPage/(pages.length-1)*100);document.getElementById('pbar').style.width = pct+'%';document.getElementById('ptext').textContent = pct+'% completado';
  document.getElementById('btnBack').classList.toggle('hidden', currentPage===0);
  document.getElementById('btnNext').textContent = currentPage===pages.length-1 ? 'Enviar ✓' : 'Siguiente →';

  // restore
  page.questions.forEach(q=>{
    if(responses[q.id]===undefined) return;
    if(q.type==='radio'){
      const el = document.querySelector(`input[name=${q.id}][value="${CSS.escape(responses[q.id])}"]`);
      if(el) el.checked=true;
    } else if(q.type==='checkbox'){
      responses[q.id].forEach(v=>{const el=document.querySelector(`input[name=${q.id}][value="${CSS.escape(v)}"]`);if(el)el.checked=true;});
    } else if(q.type==='scale'){
      const el = document.querySelector(`input[name=${q.id}][value="${responses[q.id]}"]`);
      if(el) el.checked=true;
    } else if(q.type==='textarea' || q.type==='text'){
      document.getElementById(q.id).value = responses[q.id];
    } else if(q.type==='grid'){
      Object.entries(responses[q.id]).forEach(([row,val])=>{
        const el=document.querySelector(`input[name="${q.id}_${row}"][value="${val}"]`);
        if(el) el.checked=true;
      });
    }
  });
  window.scrollTo(0,0);
}

function renderQ(q){
  const req = q.required?' <span class="req">*</span>':'';
  let h = `<div class="question" id="wrap_${q.id}"><label class="q">${q.label}${req}</label>`;
  if(q.type==='radio'){
    h += '<div class="options">';
    q.options.forEach((o,i)=>h += `<label><input type="radio" name="${q.id}" value="${o}"><span>${o}</span></label>`);
    h += '</div>';
  } else if(q.type==='checkbox'){
    h += '<div class="options">';
    q.options.forEach(o=>h += `<label><input type="checkbox" name="${q.id}" value="${o}"><span>${o}</span></label>`);
    h += '</div>';
    if(q.max) h += `<div class="subtitle" style="margin-top:4px">Máximo ${q.max} opciones</div>`;
  } else if(q.type==='scale'){
    h += '<div class="options" style="display:flex;gap:8px;justify-content:space-between;align-items:center">';
    h += `<span style="font-size:12px;color:var(--muted)">${q.minLabel}</span>`;
    for(let i=q.min;i<=q.max;i++) h += `<label style="flex-direction:column;padding:12px 16px;text-align:center"><input type="radio" name="${q.id}" value="${i}"><span style="margin-top:4px">${i}</span></label>`;
    h += `<span style="font-size:12px;color:var(--muted)">${q.maxLabel}</span></div>`;
  } else if(q.type==='textarea'){
    h += `<textarea id="${q.id}" placeholder="Escribe tu respuesta..."></textarea>`;
  } else if(q.type==='text'){
    h += `<input type="text" id="${q.id}" placeholder="${q.placeholder||''}" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px">`;
  } else if(q.type==='grid'){
    h += '<table class="grid-table"><thead><tr><th></th>';
    q.cols.forEach(c=>h += `<th>${c}</th>`);
    h += '</tr></thead><tbody>';
    q.rows.forEach((r,ri)=>{
      h += `<tr><td>${r}</td>`;
      q.cols.forEach((c,ci)=>h += `<td><input type="radio" name="${q.id}_${ri}" value="${ci+1}"></td>`);
      h += '</tr>';
    });
    h += '</tbody></table>';
  }
  h += `<div class="err-msg" id="err_${q.id}"></div></div>`;
  return h;
}

function collect(){
  const page = pages[currentPage];
  let ok = true;
  for(const q of page.questions){
    const errEl = document.getElementById('err_'+q.id);
    errEl.classList.remove('show');
    let val;
    if(q.type==='radio'||q.type==='scale'){
      const el = document.querySelector(`input[name=${q.id}]:checked`);
      val = el ? (q.type==='scale'?parseInt(el.value):el.value) : null;
    } else if(q.type==='checkbox'){
      val = [...document.querySelectorAll(`input[name=${q.id}]:checked`)].map(e=>e.value);
      if(q.max && val.length>q.max){errEl.textContent=`Máximo ${q.max} opciones`;errEl.classList.add('show');ok=false;continue;}
      if(q.mustInclude && !q.mustInclude.every(m=>val.includes(m))){errEl.textContent='Debes aceptar para continuar';errEl.classList.add('show');ok=false;continue;}
      if(q.required && val.length===0) val=null;
    } else if(q.type==='textarea' || q.type==='text'){
      val = document.getElementById(q.id).value.trim();
      if(!val && !q.required) val='';
      else if(!val) val=null;
    } else if(q.type==='grid'){
      val = {};
      let complete = true;
      q.rows.forEach((r,ri)=>{
        const el = document.querySelector(`input[name="${q.id}_${ri}"]:checked`);
        if(el) val[r]=parseInt(el.value); else complete=false;
      });
      if(q.required && !complete) val=null;
    }
    if(q.required && (val===null||val===undefined)){
      errEl.textContent='Esta pregunta es obligatoria';errEl.classList.add('show');ok=false;continue;
    }
    responses[q.id] = val;
    // filtros
    if(q.disqualify && q.disqualify.includes(val)) disqualified = true;
  }
  return ok;
}

function next(){
  if(!collect()) return;
  if(disqualified){ showEnd('noCalifica'); return; }
  if(currentPage===pages.length-1){ submit(); return; }
  currentPage++;
  render();
}

function prev(){
  currentPage--;
  render();
}

function showEnd(type){
  const area = document.getElementById('form-area');
  document.querySelector('.nav').style.display='none';
  document.getElementById('pbar').style.width='100%';
  if(type==='noCalifica'){
    area.innerHTML = '<div class="final"><h2>🐾 ¡Gracias por tu interés!</h2><p>En esta ocasión nuestra investigación está enfocada en un perfil específico de dueños de perros en Lima, por lo que no continuaremos. Apreciamos mucho tu tiempo.</p></div>';
  } else {
    // contar fallos de atención
    let fails = 0;
    pages.forEach(p=>p.questions.forEach(q=>{
      if(q.attention && responses[q.id]!==q.attention) fails++;
    }));
    area.innerHTML = `<div class="final"><h2>🎉 ¡Listo! Gracias por ayudarnos</h2><p>Tus respuestas son muy valiosas para nuestra investigación académica.</p><p style="margin-top:20px"><button class="btn" onclick="download()">⬇ Descargar mis respuestas (JSON)</button></p>${fails>=2?'<p style="color:var(--err);font-size:12px;margin-top:20px">[Nota interna: '+fails+' preguntas de atención falladas]</p>':''}</div>`;
  }
}

function submit(){
  responses._timestamp = new Date().toISOString();
  responses._completed = true;
  const ENDPOINT='https://script.google.com/macros/s/AKfycbyrfIuf2gfQ7Q8-pwx6VakM8rFz9_a_oR3MVtF646_KjyudBfJQ2G0jxh3mbejx94cCJw/exec';fetch(ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(responses)});
  showEnd('completada');
}

function download(){
  const blob = new Blob([JSON.stringify(responses,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`respuesta_${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
